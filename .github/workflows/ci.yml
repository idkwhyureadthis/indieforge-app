name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-lint:
    name: Backend (vet, golangci-lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

  backend-test:
    name: Backend (build, unit test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go build ./...
      - run: go test ./...

  backend-integration:
    name: Backend (integration tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Tests spin up their own infrastructure via testcontainers-go —
    # no external service containers needed, just Docker (available on ubuntu-latest).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go test -tags=integration -timeout=180s -count=1 ./...

  backend-codegen-drift:
    name: Backend (sqlc/swag codegen drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install codegen tools
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          go install github.com/swaggo/swag/cmd/swag@latest
      - name: Regenerate and check for drift
        run: |
          sqlc generate
          swag init -g cmd/indieforge/main.go -o docs --parseDependency --parseInternal
          git diff --exit-code -- internal/platform/db/sqlc docs \
            || (echo "::error::generated code is out of date — run 'sqlc generate' and 'swag init'"; exit 1)

  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npm run build
