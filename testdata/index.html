<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      user-select: none;
    }
    h1 { color: #4ade80; font-size: 2rem; margin-bottom: 8px; text-shadow: 0 0 20px #4ade80; }
    #score { font-size: 1.1rem; color: #a3a3a3; margin-bottom: 16px; letter-spacing: 2px; }
    canvas { border: 2px solid #4ade80; box-shadow: 0 0 40px #4ade8055; display: block; }
    #msg { margin-top: 14px; font-size: 0.95rem; color: #facc15; min-height: 1.4em; text-align: center; }
    #controls { margin-top: 10px; font-size: 0.75rem; color: #555; text-align: center; }
  </style>
</head>
<body>
  <h1>PIXEL SNAKE</h1>
  <div id="score">SCORE: 0 &nbsp;|&nbsp; BEST: 0</div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="msg">Press any arrow key or WASD to start</div>
  <div id="controls">↑ ↓ ← → or W A S D</div>

  <script>
    const COLS = 20, ROWS = 20, SZ = 20;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');

    let snake, dir, nextDir, food, score, best = 0, running = false, loop;

    function rand(n) { return Math.floor(Math.random() * n); }

    function placeFood() {
      const occ = new Set(snake.map(([x, y]) => `${x},${y}`));
      let fx, fy;
      do { fx = rand(COLS); fy = rand(ROWS); } while (occ.has(`${fx},${fy}`));
      food = [fx, fy];
    }

    function init() {
      snake = [[10, 10], [9, 10], [8, 10]];
      dir = [1, 0];
      nextDir = [1, 0];
      score = 0;
      placeFood();
      running = true;
      msgEl.textContent = '';
      clearInterval(loop);
      loop = setInterval(tick, 110);
    }

    function tick() {
      dir = nextDir;
      const [hx, hy] = snake[0];
      const nx = (hx + dir[0] + COLS) % COLS;
      const ny = (hy + dir[1] + ROWS) % ROWS;
      if (snake.some(([x, y]) => x === nx && y === ny)) { gameOver(); return; }
      snake.unshift([nx, ny]);
      if (nx === food[0] && ny === food[1]) {
        score++;
        if (score > best) best = score;
        scoreEl.textContent = `SCORE: ${score}   |   BEST: ${best}`;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      draw();
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, 400, 400);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#f87171';
      ctx.font = 'bold 36px Courier New';
      ctx.fillText('GAME OVER', 200, 182);
      ctx.fillStyle = '#facc15';
      ctx.font = '22px Courier New';
      ctx.fillText(`SCORE: ${score}`, 200, 228);
      msgEl.textContent = 'Press any arrow key or WASD to restart';
    }

    function draw() {
      // background
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, 400, 400);
      // grid lines
      ctx.strokeStyle = '#11111f';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i * SZ, 0); ctx.lineTo(i * SZ, 400); ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath(); ctx.moveTo(0, j * SZ); ctx.lineTo(400, j * SZ); ctx.stroke();
      }
      // snake body
      snake.forEach(([x, y], i) => {
        const t = i / Math.max(snake.length - 1, 1);
        if (i === 0) {
          ctx.fillStyle = '#4ade80';
        } else {
          const g = Math.floor(174 - t * 80);
          ctx.fillStyle = `rgb(0,${g},60)`;
        }
        ctx.fillRect(x * SZ + 1, y * SZ + 1, SZ - 2, SZ - 2);
      });
      // head eyes
      if (snake.length > 0) {
        const [hx, hy] = snake[0];
        ctx.fillStyle = '#000';
        // position eyes based on direction
        const [dx, dy] = dir;
        if (dx === 1)  { ctx.fillRect(hx*SZ+14, hy*SZ+4,  3, 3); ctx.fillRect(hx*SZ+14, hy*SZ+13, 3, 3); }
        if (dx === -1) { ctx.fillRect(hx*SZ+3,  hy*SZ+4,  3, 3); ctx.fillRect(hx*SZ+3,  hy*SZ+13, 3, 3); }
        if (dy === -1) { ctx.fillRect(hx*SZ+4,  hy*SZ+3,  3, 3); ctx.fillRect(hx*SZ+13, hy*SZ+3,  3, 3); }
        if (dy === 1)  { ctx.fillRect(hx*SZ+4,  hy*SZ+14, 3, 3); ctx.fillRect(hx*SZ+13, hy*SZ+14, 3, 3); }
      }
      // food (apple)
      if (food) {
        const cx = food[0] * SZ + SZ / 2;
        const cy = food[1] * SZ + SZ / 2;
        ctx.fillStyle = '#f87171';
        ctx.beginPath();
        ctx.arc(cx, cy, SZ / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
        // stem
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(cx - 1, food[1] * SZ + 1, 2, 5);
      }
    }

    // draw idle state
    (function drawIdle() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, 400, 400);
      ctx.fillStyle = '#1a2a1a';
      ctx.font = '18px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('Ready to play', 200, 205);
    })();

    const keyMap = {
      ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
      w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
      W: [0,-1], S: [0,1], A: [-1,0], D: [1,0],
    };

    document.addEventListener('keydown', e => {
      const nd = keyMap[e.key];
      if (!nd) return;
      e.preventDefault();
      if (!running) { init(); return; }
      // forbid 180° reversal
      if (nd[0] !== -dir[0] || nd[1] !== -dir[1]) nextDir = nd;
    });

    // touch controls for mobile
    let touchStart = null;
    canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.clientX;
      const dy = e.changedTouches[0].clientY - touchStart.clientY;
      touchStart = null;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      let nd;
      if (Math.abs(dx) > Math.abs(dy)) nd = dx > 0 ? [1,0] : [-1,0];
      else nd = dy > 0 ? [0,1] : [0,-1];
      if (!running) { init(); return; }
      if (nd[0] !== -dir[0] || nd[1] !== -dir[1]) nextDir = nd;
    }, { passive: true });
  </script>
</body>
</html>
